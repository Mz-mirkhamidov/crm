# A string used to distinguish different Supabase projects on the same host.
project_id = "sellora-plus-crm"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://crm.selloraplus.uz"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false

[functions.daily-reminder]
verify_jwt = false

# Cron: every day at 04:00 UTC = 09:00 Tashkent (UTC+5)
# To enable cron, add this in Supabase dashboard → Edge Functions → Schedules
# schedule = "0 4 * * *"
